[pytest]
# --- General Configuration ---
# Only look for tests in the 'tests' directory to avoid noise
testpaths = tests
python_files = test_*.py

# --- Professional Warning Management ---
# This suppresses the SwigPy and swigvarlink warnings commonly seen in
# ML libraries like Torch/Transformers without hiding real code errors.
filterwarnings =
    ignore:builtin type SwigPyPacked has no __module__ attribute:DeprecationWarning
    ignore:builtin type SwigPyObject has no __module__ attribute:DeprecationWarning
    ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning

# --- Audit & Output Settings ---
# -ra: show extra test summary info as specified by (a)ll except passed
# --strict-markers: ensures you don't use unregistered markers
addopts = -ra --strict-markers

# --- Coverage Configuration ---
# --cov=src: Replace 'src' with the name of your main code folder (e.g., qwen_v2d5)
# --cov-report=term-missing: Shows which specific lines are NOT covered in the terminal
# --cov-report=xml: Generates a file for GitHub/Auditors to review
addopts = -ra --strict-markers --cov=. --cov-report=term-missing --cov-report=xml

[pytest]
# --- 📂 General Configuration ---
# Only look for tests in the 'tests' directory
testpaths = tests
# Include your smoke_test.py specifically
python_files = test_*.py smoke_test.py

# --- 🔍 Professional Warning Management ---
# Suppresses SwigPy and swigvarlink warnings from ML libraries/Torch
filterwarnings =
    ignore:builtin type SwigPyPacked has no __module__ attribute:DeprecationWarning
    ignore:builtin type SwigPyObject has no __module__ attribute:DeprecationWarning
    ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning

# --- 🏷️ Marker Definitions ---
# Using markers allows you to run 'pytest -m smoke' for a fast cluster check
markers =
    smoke: vital environment and health checks
    engine: native C++ bridge validation
    benchmark: performance and latency comparisons
    hardware: tests requiring specific GPU/NPU hardware
    timeout: tests with specific execution time limits

# --- ⚙️ Audit & Output Settings ---
# -ra: show extra test summary info
# --strict-markers: prevents typos in markers
# --cov=.: tracks coverage across the project root
# --cov-report=term-missing: shows exactly which lines need tests
# --cov-report=xml: for professional auditing/GitHub reviews
addopts = -ra --strict-markers --cov=. --cov-report=term-missing --cov-report=xml

# --- 🚫 Performance Exclusions ---
# Prevents pytest from scanning 100s of model/data files or your virtualenv
norecursedirs = .venv genai data models .git

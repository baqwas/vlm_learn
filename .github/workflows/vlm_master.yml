name: VLM Integrity & Security Master

permissions:
  contents: write  # Changed to write for README updates

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  security_scan:
    name: GitGuardian Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: GitGuardian scan
        uses: GitGuardian/ggshield-action@main
        env:
          GITHUB_DEFAULT_BRANCH: master
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  vlm_audit:
    name: Model Integrity Audit
    needs: security_scan
    runs-on: ubuntu-latest
    outputs:
      vram: ${{ steps.check.outputs.vram }}
      status: ${{ steps.check.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'  # Matches your local Python 3.13.7 environment

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          # Explicitly install CPU-only torch to save time and space on the runner
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # Install everything else from your requirements.txt
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Ensure transformers and utils are present if not in requirements.txt
          pip install transformers qwen-vl-utils

      - name: Run Audit
        id: check
        run: |
          # Professional audit call
          OUTPUT=$(python3 utilities/check_vlm_health.py)
          echo "vram=$(echo "$OUTPUT" | grep 'VRAM_GB:' | cut -d':' -f2 | xargs)" >> $GITHUB_OUTPUT
          echo "status=$(echo "$OUTPUT" | grep 'VLM_STATUS:' | cut -d':' -f2 | xargs)" >> $GITHUB_OUTPUT

  update_readme:
    name: Update Model Dashboard
    needs: vlm_audit
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4
      - name: Inject VLM Stats
        run: |
          ICON=$([[ "${{ needs.vlm_audit.outputs.status }}" == "OK" ]] && echo "🟢" || echo "🔴")
          VRAM="${{ needs.vlm_audit.outputs.vram }} GB"
          sed -i "s|VLM Status:.*|VLM Status: $ICON $VRAM|g" README.md
      - name: Commit & Push
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "baqwas-bot"
          git config user.email "bot@baqwas.com"
          git add README.md
          git commit -m "chore: automated vlm health update [skip ci]" || exit 0
          git push https://x-access-token:${GH_PAT}@github.com/baqwas/vlm_learn.git master

name: VLM Integrity & Security Master

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  security_scan:
    name: GitGuardian Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: GitGuardian scan
        uses: GitGuardian/ggshield-action@main
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: master
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  vlm_audit:
    name: Model Integrity Audit
    needs: security_scan
    runs-on: ubuntu-latest
    outputs:
      vram: ${{ steps.check.outputs.vram }}
      status: ${{ steps.check.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install torch
      - name: Run Audit
        id: check
        run: |
          # Create dummy weights for the runner check
          mkdir -p models && touch models/checkpoint.safetensors
          OUTPUT=$(python utilities/check_vlm_health.py)
          VRAM=$(echo "$OUTPUT" | grep "VRAM_GB:" | cut -d':' -f2 | xargs)
          STATUS=$(echo "$OUTPUT" | grep "VLM_STATUS:" | cut -d':' -f2 | xargs)
          echo "vram=$VRAM" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT

  update_readme:
    name: Update Model Dashboard
    needs: vlm_audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject VLM Stats
        run: |
          ICON=$([[ "${{ needs.vlm_audit.outputs.status }}" == "OK" ]] && echo "🟢" || echo "🔴")
          VRAM="${{ needs.vlm_audit.outputs.vram }} GB"
          sed -i "s|VLM Status:.*|VLM Status: $ICON $VRAM|g" README.md
      - name: Commit & Push
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "baqwas-bot"
          git config user.email "bot@baqwas.com"
          git add README.md
          git commit -m "chore: automated vlm health update [skip ci]" || exit 0
          git push https://x-access-token:${GH_PAT}@github.com/baqwas/vlm_learn.git master

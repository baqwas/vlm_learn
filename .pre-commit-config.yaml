# ================================================================================
# PROJECT: VLM Learn / ParkCircus Productions 🚀
# PURPOSE: Hardened Task-Oriented Security, Licensing, and Functional Audit
# UPDATED: 2026-03-05
# ================================================================================

repos:
  # 1. CORE QUALITY & FILE INTEGRITY
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']

  # 2. SECRET SCANNING (GITGUARDIAN)
  - repo: https://github.com/GitGuardian/ggshield
    rev: v1.35.0
    hooks:
      - id: ggshield
        stages: [pre-commit]

  # 3. RIGID LICENSING & DOCUMENTATION (LOCAL)
  - repo: local
    hooks:
      - id: check-license-header
        name: 📜 MIT License & Author Header
        # Regex validates existence of Version, Updated, and Copyright
        entry: '(?s)^#!/usr/bin/env python3\s+"""\s+={5,}.*?PROJECT:.*?VERSION: [0-9.]+\s+UPDATED:.*?\s+COPYRIGHT: \(c\) 2026 ParkCircus Productions; All Rights Reserved\..*?AUTHOR:.*?Matha Goram.*?LICENSE:.*?MIT.*?'
        language: pygrep
        types: [python]
        description: "Ensures Python files include the standardized ParkCircus Productions header."

  # 4. VLM FUNCTIONAL HEALTH AUDIT (STDOUT ONLY)
  - repo: local
    hooks:
      - id: vlm-health-audit
        name: 🩺 VLM Integrity Check
        # Uses the refactored script that prints to console instead of logs/
        entry: python3 utilities/check_vlm_health.py
        language: system
        pass_filenames: false
        always_run: true
        description: "Audits hardware and model paths without creating unstaged file changes."

  # 5. CODE FORMATTING
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        exclude: |
          (?x)^(
              projects/archive/|
              benchmarks/qwen/utils/|  # Add this line
              qwen_v2/
          )

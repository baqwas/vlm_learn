# --- 📧 [SMTP] COMMUNICATION TIER ---
# Logic: Centralized mail relay settings for automated system reports.
[smtp]
server   = "${SMTP_SERVER}"
port     = 587
user     = "${SMTP_USER}"
password = "${SMTP_PASSWORD}"
sender   = "${SMTP_SENDER}"
receiver = "${SMTP_RECEIVER}"
use_tls  = true

# --- 📡 [MQTT] MESSAGING TIER ---
# Logic: Real-time telemetry broker for Node-RED and Dashboard integration.
[mqtt]
broker   = "${MQTT_BROKER}"
port     = 1883
user     = "${MQTT_USER}"
password = "${MQTT_PASSWORD}"
topic_prefix = "satellite/noaa"

# --- 🗄️ [MARIADB] DATABASE TIER ---
# Logic: Primary persistence layer for rainfall records and station metadata.
[mariadb]
host     = "${DB_HOST}"
user     = "${DB_USER}"
password = "${DB_PASSWORD}"
database = "${DB_DATABASE}"
port     = 3306

# --- 📽️ [VIDEO_AUDITOR] PERFORMANCE & AUDIT TIER ---
# Logic: Centralized parameters for VLM action auditing and benchmarking.
[video_auditor]
model_id        = "Qwen/Qwen2.5-VL-3B-Instruct"
video_dir       = "/home/reza/Videos/opencv/vlm/qwen2.5-vl/videos"
log_file        = "/home/reza/Videos/opencv/logs/video_audit.log"
system_prompt   = "You are an expert action auditor. Analyze the video for quality and safety."
fps             = 1.0
